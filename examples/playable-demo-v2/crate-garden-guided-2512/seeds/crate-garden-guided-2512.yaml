id: crate-garden-guided-2512
title: Crate Garden Guided 2512
goal: Generate and validate a local guided grid-puzzle project without raw JSON/YAML hand editing.
constraints:
  target: game-runtime
acceptance:
  - Project manifest, seed, scenario, review/apply decision, playtest backlog, and scenes are generated by the guided CLI command.
  - The after-review scene replays the intended grid-puzzle solution to grid_won=true in the local runtime.
  - Browser and Studio surfaces remain read-only; trusted writes stay in the Rust/local CLI gate.
scenarios:
  - id: guided-grid-puzzle-win-path
    description: Replay the generated grid-puzzle intended solution and observe the win state.
    assertions:
      - world_state:
          path: gridPuzzle.status
          equals: won
      - world_state:
          path: gridPuzzle.win.satisfied
          equals: true
