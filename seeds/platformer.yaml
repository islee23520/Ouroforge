id: platformer.v0
title: Platformer Harness Seed
goal: Drive the local private MVP loop through the minimal 2D runtime and evidence pipeline.
constraints:
  target: game-runtime
acceptance:
  - Seed validation reports the platformer.v0 seed as valid.
  - Running the seed with workers creates independent browser evidence, scenario results, a verdict, and a journal.
scenarios:
  - id: bootstrap-smoke
    description: Move the player right for four fixed-timestep frames in the minimal game runtime.
    steps:
      - input:
          right: true
      - wait:
          frames: 4
    assertions:
      - world_state:
          path: object.x
          equals: 40
      - frame_stats:
          path: fixedDeltaMs
          equals: 16
      - world_state:
          path: renderer.version
          equals: '1'
      - world_state:
          path: renderer.camera.x
          equals: 0
      - world_state:
          path: renderer.renderedEntities.0.entityId
          equals: player
