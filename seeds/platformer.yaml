id: platformer.v0
title: Platformer Harness Seed
goal: Prove the initial Ouroforge Seed → Run → Ledger → Evidence Index → Journal → Verdict contract.
constraints:
  target: file-harness
acceptance:
  - Seed validation reports the platformer.v0 seed as valid.
  - Running the seed creates the required file-based run artifacts.
scenarios:
  - id: bootstrap-smoke
    description: Validate the minimal runtime probe contract without executing it yet.
    steps:
      - wait:
          frames: 2
      - input:
          right: true
    assertions:
      - world_state:
          path: tick
          equals: 2
      - frame_stats:
          path: fixedDeltaMs
          equals: 16
