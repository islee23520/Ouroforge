name: Public readiness task
description: Track release-readiness remediation without publishing automatically
labels: [public-readiness]
body:
  - type: markdown
    attributes:
      value: |
        Public readiness tasks must not change repository visibility or publish announcements. They should improve evidence, docs, governance, templates, security-contact guidance, or demo reproducibility. Classify public intake with `docs/public-issue-intake-triage-v1.md`. The template label is provisional; the selected public intake category is authoritative for maintainer triage. For post-launch docs and roadmap communication, use `docs/post-launch-roadmap-triage-v1.md` and `docs/post-launch-roadmap-response-snippets-v1.md`. Do not post exploit details, secrets, private paths, or private screenshots in public readiness issues.
  - type: dropdown
    id: intake_category
    attributes:
      label: Public intake category
      description: Choose the closest category from docs/public-issue-intake-triage-v1.md.
      options:
        - Demo/onboarding
        - Docs
        - Roadmap/governance
        - Security
        - Support question
        - Bug
        - Feature request
        - Forbidden scope request
    validations:
      required: true
  - type: textarea
    id: blocker
    attributes:
      label: Readiness blocker
      description: Which public-readiness blocker does this address?
    validations:
      required: true
  - type: textarea
    id: remediation
    attributes:
      label: Remediation scope
      description: Describe the exact documentation, evidence, audit, or template change.
    validations:
      required: true
  - type: dropdown
    id: governance_route
    attributes:
      label: Governance route
      description: Choose how this task should be handled without automating public launch.
      options:
        - Public Docs v2
        - Public readiness evidence refresh
        - Launch checklist/manual decision support
        - Roadmap triage communication
        - Security/contact policy documentation
        - Unsure / needs maintainer triage
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification evidence
      description: Commands, fresh-clone smoke output, screenshots, recordings, or audit output required to close this task.
    validations:
      required: true
  - type: checkboxes
    id: release_guardrails
    attributes:
      label: Release guardrails
      options:
        - label: This does not change repository visibility.
          required: true
        - label: This does not publish a release announcement.
          required: true
        - label: This does not promise compatibility before MVP stabilization.
          required: true
        - label: This does not overstate Ouroforge maturity.
          required: true
        - label: This does not close or modify #1 or #23 without a separate explicit governance decision.
          required: true
        - label: This does not include exploit details, secrets, private paths, private screenshots, or unsanitized generated artifacts.
          required: true
