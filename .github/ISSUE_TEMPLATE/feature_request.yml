name: Scoped feature request
description: Propose a feature tied to the evidence-native loop
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Ouroforge accepts narrowly scoped feature requests that preserve the evidence-native loop. First classify the public issue using `docs/public-issue-intake-triage-v1.md`, then route requests through `docs/post-launch-roadmap-triage-v1.md`; design-gate buckets do not authorize implementation by themselves. Avoid broad editor/engine/platform requests unless they include concrete MVP evidence and non-goals.
  - type: dropdown
    id: intake_category
    attributes:
      label: Public intake category
      description: Choose the closest category from docs/public-issue-intake-triage-v1.md.
      options:
        - Feature request
        - Docs
        - Demo/onboarding
        - Roadmap/governance
        - Forbidden scope request
        - Support question
        - Bug
        - Security
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What specific user or evidence-loop problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed scope
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: roadmap_bucket
    attributes:
      label: Roadmap bucket
      description: Choose the smallest matching bucket from docs/post-launch-roadmap-triage-v1.md. Design-gate buckets do not authorize implementation by themselves.
      options:
        - Source Mutation Apply Design Gate
        - Native Export Design Gate
        - Plugin Design Gate
        - Distributed QA Design Gate
        - Visual Authoring v2
        - Asset Pipeline v2
        - Engine Expressiveness v3
        - Public Docs v2
        - Unsure / needs maintainer triage
    validations:
      required: true
  - type: textarea
    id: acceptance_route
    attributes:
      label: Acceptance, rejection, or move criteria
      description: Explain why this should be accepted into the chosen bucket, moved to a design gate, clarified, rejected, or deferred as generated/local state.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or artifact context
      description: Link run ids, journals, verdicts, screenshots, or docs that justify the request.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Explicit non-goals
      description: What should this not include?
    validations:
      required: true
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: This request does not require cloud hosting, auth, marketplace, native packaging, or plugin systems unless explicitly justified.
          required: true
        - label: This request does not claim Ouroforge is a Godot replacement.
          required: true
        - label: This request can be verified with local artifacts or commands.
          required: true
        - label: This request names a roadmap bucket or explicitly asks for maintainer triage.
          required: true
        - label: This request does not rely on generated local state being committed unless a separate fixture-scoped issue authorizes it.
          required: true
